name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Configure git for SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin "git@github.com:${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git fetch --tags --force
            LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [ -n "$LATEST_TAG" ]; then
              VERSION="${LATEST_TAG#v}"
              echo "new_release_published=true" >> "$GITHUB_OUTPUT"
              echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"
            else
              echo "new_release_published=false" >> "$GITHUB_OUTPUT"
              echo "new_release_version=" >> "$GITHUB_OUTPUT"
            fi
          else
            npx --package semantic-release \
              --package @semantic-release/commit-analyzer \
              --package @semantic-release/release-notes-generator \
              --package @semantic-release/changelog \
              --package @semantic-release/npm \
              --package @semantic-release/exec \
              --package @semantic-release/git \
              --package @semantic-release/github \
              --package conventional-changelog-conventionalcommits \
              semantic-release

            if [ -f .release-version ]; then
              VERSION=$(cat .release-version)
              echo "new_release_published=true" >> "$GITHUB_OUTPUT"
              echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"
            else
              echo "new_release_published=false" >> "$GITHUB_OUTPUT"
              echo "new_release_version=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Login to Container Registry
        if: steps.release.outputs.new_release_published == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Docker image already exists
        id: check
        if: steps.release.outputs.new_release_published == 'true'
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: v${{ steps.release.outputs.new_release_version }}
        run: |
          if docker manifest inspect "$IMAGE:$VERSION" > /dev/null 2>&1; then
            echo "Image $IMAGE:$VERSION already exists, skipping docker build"
            echo "docker_image_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image $IMAGE:$VERSION does not exist, proceeding with build"
            echo "docker_image_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.docker_image_exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        if: steps.check.outputs.docker_image_exists == 'false'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=semver,pattern={{major}},value=v${{ steps.release.outputs.new_release_version }},enable=${{ steps.release.outputs.new_release_version != '' }}
            type=raw,value=latest

      - name: Build and push
        if: steps.check.outputs.docker_image_exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max
