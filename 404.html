<!--
  SPA redirect for GitHub Pages
  Redirects all 404s to index.html for React Router support (history-based routing)
-->
<script type="text/javascript">
  // If the current path is not the root, redirect to index.html
  // GitHub Pages will serve index.html for this path, and React Router takes over
  if (location.pathname !== '/app-gisat-deckglSandbox/' && !location.pathname.endsWith('index.html')) {
    var newUrl = '/app-gisat-deckglSandbox/index.html?redirect=' + encodeURIComponent(location.pathname.replace('/app-gisat-deckglSandbox/', '')) + location.search + location.hash;
    location.replace(newUrl);
  }
</script>
